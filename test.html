<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Capture</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    text-align: center;
}

h2 {
    margin: 10px 0;
}

video {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    border-bottom: 3px solid #333;
}

.container {
    padding: 10px;
}

.canvas-box {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

canvas {
    width: 48%;
    border-radius: 10px;
    border: 2px solid #444;
}

button {
    width: 100%;
    padding: 15px;
    margin: 8px 0;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
}

button:active {
    background: #0056b3;
}

#combineBtn {
    background: #28a745;
}

#downloadBtn {
    background: #ff5722;
}

#finalCanvas {
    width: 100%;
    margin-top: 10px;
    border: 2px solid #000;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>📸 Capture Photos</h2>

<video id="video" autoplay playsinline></video>

<div class="container">

    <button onclick="captureUser()">👤 Capture User Photo</button>
    <button onclick="captureID()">🪪 Capture ID Photo</button>
    <button id="combineBtn" onclick="combineImages()">🔗 Combine Photos</button>

    <div class="canvas-box">
        <canvas id="userCanvas" width="300" height="220"></canvas>
        <canvas id="idCanvas" width="300" height="220"></canvas>
    </div>

    <canvas id="finalCanvas" width="640" height="240"></canvas>

    <button id="downloadBtn" onclick="downloadImage()">⬇️ Download</button>

</div>

<script>
let video = document.getElementById("video");

// Open rear camera (important for mobile)
navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: "environment"
    }
})
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera access error!");
});

// Capture User
function captureUser() {
    let canvas = document.getElementById("userCanvas");
    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
}

// Capture ID
function captureID() {
    let canvas = document.getElementById("idCanvas");
    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
}

// Combine
function combineImages() {
    let finalCanvas = document.getElementById("finalCanvas");
    let ctx = finalCanvas.getContext("2d");

    let userCanvas = document.getElementById("userCanvas");
    let idCanvas = document.getElementById("idCanvas");

    ctx.clearRect(0, 0, finalCanvas.width, finalCanvas.height);

    ctx.drawImage(userCanvas, 0, 0, 320, 240);
    ctx.drawImage(idCanvas, 320, 0, 320, 240);
}

// Download
function downloadImage() {
    let finalCanvas = document.getElementById("finalCanvas");
    let link = document.createElement("a");
    link.download = "photo_combined.png";
    link.href = finalCanvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
